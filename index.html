<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Meta Viewport: Kunci utama agar pas di layar HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 Dreamy Cosmic Garden - Ultimate Edition</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020205;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none; /* Mencegah zoom tidak sengaja di HP */
        }

        /* --- LAYAR PEMBUKA --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020205;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1.5s ease;
        }

        #startBtn {
            padding: 15px 35px;
            font-size: 18px;
            background: transparent;
            color: #ff8ab8;
            border: 2px solid #ff8ab8;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 138, 184, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10001;
        }

        /* --- BACKGROUND: NEBULA --- */
        .nebula-container {
            position: absolute;
            width: 150%; height: 150%;
            z-index: -3;
            filter: blur(80px);
            opacity: 0.4;
            animation: rotateNebula 60s linear infinite;
        }
        .nebula-1 {
            position: absolute; top: 20%; left: 20%; width: 60%; height: 60%;
            background: radial-gradient(circle, #240046 0%, transparent 70%);
        }
        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- BULAN SABIT --- */
        .moon {
            position: absolute;
            top: 8%; right: 12%;
            width: 70px; height: 70px;
            background: transparent;
            border-radius: 50%;
            box-shadow: -12px 12px 0 2px #fffbe6;
            filter: drop-shadow(0 0 20px rgba(255, 251, 230, 0.6));
            z-index: -1;
            transform: rotate(-10deg);
        }

        /* --- AWAN --- */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            filter: blur(25px);
            border-radius: 50%;
            z-index: -2;
            animation: moveClouds var(--t) linear infinite;
        }
        @keyframes moveClouds { from { left: -30%; } to { left: 130%; } }

        /* --- EFEK KELOPAK GUGUR --- */
        .falling-petal {
            position: absolute;
            background: #ffb3c1;
            border-radius: 150% 0 150% 0;
            z-index: 1;
            pointer-events: none;
            animation: petalFall linear infinite;
        }
        @keyframes petalFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        /* --- BUNGA UTAMA --- */
        svg {
            max-width: 90%;
            max-height: 80vh;
            display: block;
            z-index: 5;
            transition: transform 0.5s ease;
        }

        .flower-stem { transform-origin: bottom center; animation: sway 7s ease-in-out infinite; filter: drop-shadow(0 0 15px rgba(255, 107, 138, 0.3)); }
        @keyframes sway { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
        
        .petals { filter: drop-shadow(0 0 12px currentColor); animation: glow 3s ease-in-out infinite alternate; }
        @keyframes glow { from { opacity: 0.85; filter: drop-shadow(0 0 8px currentColor); } to { opacity: 1; filter: drop-shadow(0 0 20px currentColor); } }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* --- RESPONSIVE UNTUK HP --- */
        @media (max-width: 600px) {
            .moon {
                width: 50px;
                height: 50px;
                top: 5%;
                right: 8%;
                box-shadow: -8px 8px 0 1px #fffbe6;
            }
            svg {
                transform: scale(1.1) translateY(50px); /* Memperbesar bunga sedikit agar fokus di layar HP */
            }
            #startBtn {
                padding: 12px 25px;
                font-size: 15px;
            }
        }
        
        /* Style untuk elemen tambahan */
        .blink { position: absolute; background: white; border-radius: 50%; z-index: -1; animation: blinkAnim var(--d) ease-in-out infinite; }
        @keyframes blinkAnim { 0%, 100% { opacity: 0.2; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
        
        .shooting-star { position: absolute; width: 2px; height: 2px; background: white; opacity: 0; z-index: -2; box-shadow: 0 0 10px 2px white; animation: shoot 4s linear infinite; }
        @keyframes shoot { 0% { transform: translateX(0) translateY(0) rotate(-45deg) scale(0); opacity: 0; } 10% { opacity: 1; } 20% { transform: translateX(-500px) translateY(500px) rotate(-45deg) scale(1); opacity: 0; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="overlay">
    <button id="startBtn">Klik buat liat bunganya</button>
</div>

<audio id="bgm" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<div class="nebula-container"><div class="nebula-1"></div></div>
<div class="moon"></div>
<div id="cloud-container"></div>
<div id="blink-container"></div>
<div id="shooting-stars"></div>
<div id="petal-container"></div>
<div class="vignette"></div>

<svg viewBox="0 0 600 900">
    <defs>
        <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4a9c3d"/><stop offset="60%" stop-color="#3d7a32"/><stop offset="100%" stop-color="#5d3a1a"/>
        </linearGradient>
        <radialGradient id="petalGrad" cx="50%" cy="30%">
            <stop offset="0%" stop-color="#ff8ab8"/><stop offset="70%" stop-color="#ff4d79"/><stop offset="100%" stop-color="#d43f66"/>
        </radialGradient>
        <radialGradient id="centerGrad">
            <stop offset="0%" stop-color="#fffb9a"/><stop offset="100%" stop-color="#f4b400"/>
        </radialGradient>
    </defs>

    <!-- Bunga Kiri -->
    <g class="flower-stem" style="animation-delay: -1.5s;">
        <path d="M300 850 C280 700, 150 500, 160 320" stroke="url(#stemGrad)" stroke-width="6" stroke-linecap="round" fill="none" />
        <g transform="translate(-140, 20)">
            <g class="petals" style="color: #ff6b8a;">
                <ellipse cx="300" cy="230" rx="45" ry="65" fill="url(#petalGrad)"/><ellipse cx="260" cy="250" rx="40" ry="60" fill="url(#petalGrad)" transform="rotate(-30 260 250)"/><ellipse cx="340" cy="250" rx="40" ry="60" fill="url(#petalGrad)" transform="rotate(30 340 250)"/><circle cx="300" cy="280" r="25" fill="url(#centerGrad)"/>
            </g>
        </g>
    </g>

    <!-- Bunga Kanan -->
    <g class="flower-stem" style="animation-delay: -3s;">
        <path d="M300 850 C320 700, 450 500, 440 320" stroke="url(#stemGrad)" stroke-width="6" stroke-linecap="round" fill="none" />
        <g transform="translate(140, 20)">
            <g class="petals" style="color: #ff6b8a;">
                <ellipse cx="300" cy="230" rx="45" ry="65" fill="url(#petalGrad)"/><ellipse cx="260" cy="250" rx="40" ry="60" fill="url(#petalGrad)" transform="rotate(-30 260 250)"/><ellipse cx="340" cy="250" rx="40" ry="60" fill="url(#petalGrad)" transform="rotate(30 340 250)"/><circle cx="300" cy="280" r="25" fill="url(#centerGrad)"/>
            </g>
        </g>
    </g>

    <!-- Bunga Tengah -->
    <g class="flower-stem">
        <path d="M300 850 C300 700, 310 500, 300 180" stroke="url(#stemGrad)" stroke-width="10" stroke-linecap="round" fill="none" />
        <ellipse cx="270" cy="750" rx="40" ry="20" fill="#2d8a4a" transform="rotate(-20 270 750)"/><ellipse cx="330" cy="760" rx="45" ry="22" fill="#2d8a4a" transform="rotate(20 330 760)"/>
        <g class="petals" style="color: #ff8ab8;">
            <ellipse cx="300" cy="110" rx="55" ry="75" fill="url(#petalGrad)"/><ellipse cx="245" cy="140" rx="50" ry="70" fill="url(#petalGrad)" transform="rotate(-25 245 140)"/><ellipse cx="355" cy="140" rx="50" ry="70" fill="url(#petalGrad)" transform="rotate(25 355 140)"/><circle cx="300" cy="165" r="30" fill="url(#centerGrad)"/>
        </g>
    </g>
</svg>

<script>
    const bgm = document.getElementById('bgm');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');

    startBtn.addEventListener('click', () => {
        bgm.currentTime = 45; 
        bgm.play(); 
        overlay.style.opacity = '0'; 
        setTimeout(() => { 
            overlay.style.display = 'none'; 
            setInterval(createPetal, 450); 
        }, 1500);
    });

    // Blink-blink
    const blinkContainer = document.getElementById('blink-container');
    for (let i = 0; i < 60; i++) {
        const blink = document.createElement('div');
        blink.className = 'blink';
        const size = Math.random() * 2 + 1;
        blink.style.width = size + 'px';
        blink.style.height = size + 'px';
        blink.style.left = Math.random() * 100 + 'vw';
        blink.style.top = Math.random() * 100 + 'vh';
        blink.style.setProperty('--d', (Math.random() * 3 + 1) + 's');
        blink.style.animationDelay = Math.random() * 5 + 's';
        blinkContainer.appendChild(blink);
    }

    // Awan
    const cloudContainer = document.getElementById('cloud-container');
    for (let i = 0; i < 4; i++) {
        const cloud = document.createElement('div');
        cloud.className = 'cloud';
        cloud.style.width = (Math.random() * 150 + 150) + 'px';
        cloud.style.height = (Math.random() * 60 + 60) + 'px';
        cloud.style.top = Math.random() * 60 + 'vh';
        cloud.style.setProperty('--t', (Math.random() * 20 + 30) + 's');
        cloudContainer.appendChild(cloud);
    }

    function createPetal() {
        const container = document.getElementById('petal-container');
        const p = document.createElement('div');
        p.className = 'falling-petal';
        p.style.left = Math.random() * 100 + 'vw';
        const size = Math.random() * 8 + 6;
        p.style.width = size + 'px';
        p.style.height = (size + 2) + 'px';
        p.style.animationDuration = (Math.random() * 3 + 4) + 's';
        container.appendChild(p);
        setTimeout(() => p.remove(), 7000);
    }

    function createShootingStar() {
        const container = document.getElementById('shooting-stars');
        const star = document.createElement('div');
        star.className = 'shooting-star';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 40 + 'vh';
        container.appendChild(star);
        setTimeout(() => star.remove(), 4000);
    }
    setInterval(createShootingStar, 6000);

    // Mouse/Touch Trail
    const handleMove = (e) => {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const p = document.createElement('div');
        p.style.position = 'fixed';
        p.style.left = x + 'px'; p.style.top = y + 'px';
        p.style.width = '2px'; p.style.height = '2px';
        p.style.background = 'white'; p.style.boxShadow = '0 0 10px 1px #ff8ab8';
        p.style.borderRadius = '50%'; p.style.pointerEvents = 'none'; p.style.zIndex = '999';
        document.body.appendChild(p);
        p.animate([{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(3)', opacity: 0 }], { duration: 600 });
        setTimeout(() => p.remove(), 600);
    };
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('touchmove', handleMove);
</script>

</body>
</html>
